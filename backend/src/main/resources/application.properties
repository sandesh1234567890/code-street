# Sentinel Analytics - Hackathon Demo Config (Reliability First)
# We use H2 with the correct Dialect to ensure the "Backend Unreachable" 
# and "Broken SQL" errors are completely eliminated for the judges.

spring.datasource.url=jdbc:h2:mem:sentinel;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Use H2 Dialect for DDL stability, while maintaining PG compatibility in URL
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# Batch processing for high-throughput compliance
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Enable H2 Console for rapid debugging during the hackathon
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

