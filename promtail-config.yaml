# Sentinel Analytics - Promtail Configuration
# This config allows a standard Promtail agent to ship logs to the Sentinel platform.

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://localhost:8080/loki/api/v1/push?api_key=sentinel-demo-key-2026
    tenant_id: "sentinel-demo"

scrape_configs:
  - job_name: system_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlogs
          env: production
          __path__: /var/log/*.log

  - job_name: application_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: app-sentinel
          env: staging
          level: INFO
          __path__: d:/react/sentinel-analytics/backend/logs/*.log
